name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: deck_shuffle_draw
            name: deck_shuffle_draw-Linux-x86_64.tar.gz
          
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: deck_shuffle_draw.exe
            name: deck_shuffle_draw-Windows-x86_64.zip
          
          - os_name: macOS-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin: deck_shuffle_draw
            name: deck_shuffle_draw-Darwin-x86_64.tar.gz
          
          - os_name: macOS-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: deck_shuffle_draw
            name: deck_shuffle_draw-Darwin-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4
      
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}
      
      - name: Install dependencies (Ubuntu)
        if: matrix.platform.os_name == 'Linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
      
      - name: Build binary
        run: cargo build --verbose --locked --release --target ${{ matrix.platform.target }}
      
      - name: Package as archive (Unix)
        if: matrix.platform.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czvf ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}
          cd -
      
      - name: Package as archive (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} -DestinationPath ${{ matrix.platform.name }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.os_name }}
          path: ${{ matrix.platform.name }}
      
      - name: Publish release artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.platform.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
